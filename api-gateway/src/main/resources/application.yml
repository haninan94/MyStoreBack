server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**
        - id: auth-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/auth/**
        - id: product-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/products/**

management:
  endpoints:
    web:
      exposure:
        include: health, info
